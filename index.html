<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Central - Vendor Validator Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cps-navy: #0B3C5D;
            --cps-navy-dark: #072a42;
            --cps-navy-light: #1a5f8a;
            --cps-gold: #D4AF37;
            --cps-gold-light: #f4e5b8;
            --cps-white: #ffffff;
            --cps-gray-bg: #f8f9fa;
            --cps-gray-border: #e9ecef;
            --cps-text-dark: #212529;
            --cps-text-gray: #6c757d;
            --cps-success-bg: #d1e7dd;
            --cps-success-text: #0f5132;
            --cps-danger-bg: #f8d7da;
            --cps-danger-text: #842029;
            --cps-warning-bg: #fff3cd;
            --cps-warning-text: #664d03;
            --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-primary);
            background: var(--cps-gray-bg);
            color: var(--cps-text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header Styles */
        header {
            background: var(--cps-navy);
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-svg {
            height: 40px;
            width: auto;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--cps-white);
            letter-spacing: 0.3px;
        }

        .portal-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--cps-gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: var(--cps-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cps-navy);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-status {
            font-size: 0.75rem;
            color: var(--cps-gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .user-role {
            font-size: 0.85rem;
            color: var(--cps-white);
            font-weight: 500;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
            width: 100%;
        }

        .card {
            background: var(--cps-white);
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--cps-gray-border);
            width: 100%;
            max-width: 700px;
            padding: 2.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            font-family: var(--font-primary);
            color: var(--cps-navy);
            margin-bottom: 0.5rem;
            line-height: 1.3;
            text-align: center;
        }

        .instructions {
            font-size: 0.95rem;
            color: var(--cps-text-gray);
            margin-bottom: 2rem;
            font-weight: 400;
            text-align: center;
        }

            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--cps-navy);
            color: var(--cps-white);
            border-radius: 50%;
            font-weight: 600;
            font-size: 1rem;
            margin: 0 auto 0.75rem;
        }

        .step p {
            font-size: 0.8rem;
            color: var(--cps-text-dark);
            line-height: 1.5;
        }

        .step strong {
            color: var(--cps-navy);
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
            font-weight: 600;
        }


        .coverage-note strong {
            color: var(--cps-navy);
        }

        form {
            width: 100%;
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 2rem;
            text-align: left;
        }

        .file-upload-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--cps-navy);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .file-input-container {
            position: relative;
            border: 2px dashed var(--cps-gray-border);
            border-radius: 8px;
            padding: 2rem 1.5rem;
            background: var(--cps-white);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-input-container:hover {
            border-color: var(--cps-navy);
            background: var(--cps-gray-bg);
        }

        .file-input-container.has-file {
            border-color: var(--cps-navy);
            background: var(--cps-gray-bg);
            border-style: solid;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 1rem;
            fill: var(--cps-navy);
        }

        .file-text {
            font-size: 0.95rem;
            color: var(--cps-text-dark);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .file-hint {
            font-size: 0.85rem;
            color: var(--cps-text-gray);
        }

        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.875rem 2rem;
            font-family: var(--font-primary);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--cps-white);
            background: var(--cps-navy);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background: var(--cps-navy-dark);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--cps-text-gray);
            font-size: 0.85rem;
            border-top: 1px solid var(--cps-gray-border);
            background: var(--cps-white);
        }

        @media (max-width: 600px) {
            .header-container {
                padding: 0 1rem;
            }

            .brand-name {
                font-size: 1rem;
            }

            .card {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .file-input-container {
                padding: 1.5rem 1rem;
            }

            .steps-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .step {
                display: flex;
                align-items: flex-start;
                gap: 1rem;
                text-align: left;
            }
